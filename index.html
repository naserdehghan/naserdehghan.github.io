<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naser Dehghan - Senior Software Engineer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316', // orange-500
                        background: '#0a0a0a',
                        surface: {
                            DEFAULT: '#111111', // #111
                            light: '#1a1a1a', // #1a1a1a
                            dark: '#1f2937', // gray-800
                        },
                        border: {
                            DEFAULT: '#333333', // #333
                            dark: '#1f2937', // gray-800
                            hover: '#4b5563', // gray-600
                        },
                        text: {
                            DEFAULT: '#d1d5db', // gray-300
                            muted: {
                                DEFAULT: '#9ca3af', // gray-400
                                light: '#6b7280', // gray-500
                                dark: '#4b5563', // gray-600
                            },
                            emphasized: '#e5e7eb', // gray-200
                            heading: '#ffffff', // white
                        },
                        error: '#ef4444', // red-500
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-background text-text min-h-screen font-sans">
    <div id="app" x-data="resumeApp()" x-init="initApp()" class="container mx-auto p-4 md:p-8 max-w-6xl">
        <template x-if="loading">
            <div class="flex justify-center items-center h-64">
                <i class="fas fa-spinner fa-spin text-4xl text-primary"></i>
            </div>
        </template>
        <template x-if="!loading && resume">
            <div class="grid grid-cols-1 md:grid-cols-[1fr_2fr] lg:grid-cols-[300px_1fr] gap-8">
                <!-- Left Sidebar -->
                <aside class="space-y-8 lg:sticky lg:self-start lg:top-8" x-ref="sidebar" :style="'top: ' + stickyTop + 'px'" x-data="{
                    stickyTop: 32,
                    calculateSticky() {
                        if (window.innerWidth >= 1024) { // lg breakpoint
                            const sidebarHeight = this.$refs.sidebar.offsetHeight;
                            const windowHeight = window.innerHeight;
                            const offset = 32; // 2rem (top-8)

                            if (sidebarHeight + offset > windowHeight) {
                                // If sidebar is taller than viewport, sticky bottom to viewport bottom
                                this.stickyTop = windowHeight - sidebarHeight - offset;
                            } else {
                                // If shorter, sticky to top
                                this.stickyTop = offset;
                            }
                        } else {
                            this.stickyTop = 0;
                        }
                    }
                }" x-init="
                    $nextTick(() => {
                        calculateSticky();
                        window.addEventListener('resize', () => calculateSticky());

                        // Observe changes to the sidebar's content (e.g., image loading)
                        const resizeObserver = new ResizeObserver(() => calculateSticky());
                        resizeObserver.observe($refs.sidebar);
                    });
                ">

                    <!-- Profile Header Section -->
                    <div class="space-y-6">
                        <template x-if="!resume.picture.hidden">
                            <div class="relative w-48 h-48 mx-auto md:mx-0">
                                <img :src="resume.picture.url" alt="Profile Picture" class="w-full h-full object-cover grayscale rounded-3xl z-10 relative shadow-lg">
                            </div>
                        </template>

                        <div>
                            <h1 class="text-4xl font-bold text-text-heading mb-2" x-text="resume.basics.name"></h1>
                            <p class="text-xl text-primary font-medium mb-4" x-text="resume.basics.headline"></p>

                            <div class="space-y-2 text-sm text-text-muted">
                                <div class="flex items-center gap-3">
                                    <i class="fas fa-envelope w-4 text-center"></i>
                                    <a :href="'mailto:' + resume.basics.email" class="hover:text-text-heading transition-colors" x-text="resume.basics.email"></a>
                                </div>
                                <template x-if="resume.basics.phone">
                                    <div class="flex items-center gap-3">
                                        <i class="fas fa-phone w-4 text-center"></i>
                                        <a :href="'tel:' + resume.basics.phone" class="hover:text-text-heading transition-colors" x-text="resume.basics.phone"></a>
                                    </div>
                                </template>
                                <div class="flex items-center gap-3">
                                    <i class="fas fa-location-dot w-4 text-center"></i>
                                    <span x-text="resume.basics.location"></span>
                                </div>
                                <template x-if="resume.basics.website && resume.basics.website.url">
                                    <div class="flex items-center gap-3">
                                        <i class="fas fa-globe w-4 text-center"></i>
                                        <a :href="resume.basics.website.url" target="_blank" class="hover:text-text-heading transition-colors" x-text="resume.basics.website.label || resume.basics.website.url"></a>
                                    </div>
                                </template>

                                <template x-if="resume.basics.customFields && resume.basics.customFields.length > 0">
                                    <template x-for="field in resume.basics.customFields" :key="field.id">
                                        <div class="flex items-center gap-3">
                                            <i :class="field.icon ? 'w-4 text-center ' + field.icon : 'fas fa-info-circle w-4 text-center'"></i>
                                            <template x-if="field.link">
                                                <a :href="field.link" target="_blank" class="hover:text-text-heading transition-colors" x-text="field.text"></a>
                                            </template>
                                            <template x-if="!field.link">
                                                <span x-text="field.text"></span>
                                            </template>
                                        </div>
                                    </template>
                                </template>

                                <template x-if="!resume.sections.profiles.hidden">
                                    <template x-for="profile in resume.sections.profiles.items" :key="profile.id">
                                        <template x-if="!profile.hidden">
                                            <div class="flex items-center gap-3">
                                                <i :class="'fab fa-' + profile.network.toLowerCase() + ' w-4 text-center'"></i>
                                                <a :href="profile.website.url" target="_blank" class="hover:text-text-heading transition-colors" x-text="profile.network"></a>
                                            </div>
                                        </template>
                                    </template>
                                </template>
                            </div>
                        </div>

                        <!-- Download Resume Button -->
                        <button class="w-full py-3 px-4 bg-surface-light border border-border hover:border-primary hover:text-primary rounded-xl transition-all flex justify-center items-center gap-2 font-medium">
                            <i class="fas fa-download"></i>
                            Download Resume
                        </button>
                    </div>

                    <!-- Summary Section -->
                    <template x-if="!resume.summary.hidden">
                        <div class="space-y-4">
                            <h2 class="text-xl font-bold text-text-heading flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-primary"></span>
                                <span x-text="resume.summary.title"></span>
                            </h2>
                            <div class="text-sm text-text-muted leading-relaxed text-justify" x-html="resume.summary.content"></div>
                        </div>
                    </template>

                </aside>

                <!-- Right Main Content -->
                <main class="space-y-12">

                    <!-- Experience Section -->
                    <template x-if="!resume.sections.experience.hidden">
                        <section>
                            <h2 class="text-2xl font-bold text-text-heading flex items-center gap-3 mb-8">
                                <i class="fas fa-briefcase text-primary"></i>
                                <span x-text="resume.sections.experience.title"></span>
                            </h2>
                            <div class="relative border-l border-border-dark ml-3 space-y-10 pb-4">
                                <template x-for="item in resume.sections.experience.items" :key="item.id">
                                    <template x-if="!item.hidden">
                                        <div class="relative pl-8">
                                            <!-- Timeline Dot -->
                                            <span class="absolute -left-[9px] top-1.5 w-4 h-4 rounded-full bg-background border-2 border-primary"></span>

                                            <div class="flex flex-col sm:flex-row sm:items-baseline sm:justify-between gap-1 mb-2">
                                                <h3 class="text-xl font-bold text-text-heading" x-text="item.position"></h3>
                                                <div class="text-primary text-sm font-medium whitespace-nowrap" x-text="item.period"></div>
                                            </div>
                                            <div class="text-text-muted font-medium mb-4 flex items-center gap-2">
                                                <template x-if="item.website && item.website.url">
                                                    <a :href="item.website.url" target="_blank" class="hover:text-primary transition-colors" x-text="item.company"></a>
                                                </template>
                                                <template x-if="!item.website || !item.website.url">
                                                    <span x-text="item.company"></span>
                                                </template>
                                                <template x-if="item.location">
                                                    <span class="text-text-muted-dark text-sm border-l border-border-hover pl-2 ml-1" x-text="item.location"></span>
                                                </template>
                                            </div>

                                            <div class="text-text-muted text-sm leading-relaxed space-y-2 [&>p]:mb-2" x-html="item.description"></div>

                                            <!-- Roles -->
                                            <template x-if="item.roles && item.roles.length > 0">
                                                <div class="mt-4 space-y-4 border-l border-border-dark ml-2 pl-4">
                                                    <template x-for="role in item.roles" :key="role.id">
                                                        <div class="relative">
                                                            <span class="absolute -left-[21px] top-2 w-2 h-2 rounded-full bg-surface-dark"></span>
                                                            <div class="flex flex-col sm:flex-row sm:items-baseline sm:justify-between gap-1 mb-1">
                                                                <h4 class="text-md font-bold text-text-emphasized" x-text="role.position"></h4>
                                                                <div class="text-primary/80 text-xs font-medium whitespace-nowrap" x-text="role.period"></div>
                                                            </div>
                                                            <div class="text-text-muted text-sm leading-relaxed space-y-2 [&>p]:mb-2" x-html="role.description"></div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </section>
                    </template>

                    <!-- Education Section -->
                    <template x-if="resume.sections.education && !resume.sections.education.hidden && resume.sections.education.items.filter(i => !i.hidden).length > 0">
                        <section>
                            <h2 class="text-2xl font-bold text-text-heading flex items-center gap-3 mb-8">
                                <i class="fas fa-graduation-cap text-primary"></i>
                                <span x-text="resume.sections.education.title"></span>
                            </h2>
                            <div class="relative border-l border-border-dark ml-3 space-y-10 pb-4">
                                <template x-for="item in resume.sections.education.items" :key="item.id">
                                    <template x-if="!item.hidden">
                                        <div class="relative pl-8">
                                            <!-- Timeline Dot -->
                                            <span class="absolute -left-[9px] top-1.5 w-4 h-4 rounded-full bg-background border-2 border-primary"></span>

                                            <div class="flex flex-col sm:flex-row sm:items-baseline sm:justify-between gap-1 mb-2">
                                                <h3 class="text-xl font-bold text-text-heading" x-text="item.degree + (item.area ? ' in ' + item.area : '')"></h3>
                                                <div class="text-primary text-sm font-medium whitespace-nowrap" x-text="item.period"></div>
                                            </div>
                                            <div class="text-text-muted font-medium mb-4 flex items-center gap-2">
                                                <template x-if="item.website && item.website.url">
                                                    <a :href="item.website.url" target="_blank" class="hover:text-primary transition-colors" x-text="item.school"></a>
                                                </template>
                                                <template x-if="!item.website || !item.website.url">
                                                    <span x-text="item.school"></span>
                                                </template>
                                                <template x-if="item.grade">
                                                    <span class="text-text-muted-dark text-sm border-l border-border-hover pl-2 ml-1" x-text="'Grade: ' + item.grade"></span>
                                                </template>
                                                <template x-if="item.location">
                                                    <span class="text-text-muted-dark text-sm border-l border-border-hover pl-2 ml-1" x-text="item.location"></span>
                                                </template>
                                            </div>

                                            <div class="text-text-muted text-sm leading-relaxed space-y-2 [&>p]:mb-2" x-html="item.description"></div>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </section>
                    </template>

                    <!-- Volunteer Section -->
                    <template x-if="resume.sections.volunteer && !resume.sections.volunteer.hidden && resume.sections.volunteer.items.filter(i => !i.hidden).length > 0">
                        <section>
                            <h2 class="text-2xl font-bold text-text-heading flex items-center gap-3 mb-8">
                                <i class="fas fa-hand-holding-heart text-primary"></i>
                                <span x-text="resume.sections.volunteer.title"></span>
                            </h2>
                            <div class="relative border-l border-border-dark ml-3 space-y-10 pb-4">
                                <template x-for="item in resume.sections.volunteer.items" :key="item.id">
                                    <template x-if="!item.hidden">
                                        <div class="relative pl-8">
                                            <!-- Timeline Dot -->
                                            <span class="absolute -left-[9px] top-1.5 w-4 h-4 rounded-full bg-background border-2 border-primary"></span>

                                            <div class="flex flex-col sm:flex-row sm:items-baseline sm:justify-between gap-1 mb-2">
                                                <h3 class="text-xl font-bold text-text-heading" x-text="item.organization"></h3>
                                                <div class="text-primary text-sm font-medium whitespace-nowrap" x-text="item.period"></div>
                                            </div>
                                            <div class="text-text-muted font-medium mb-4 flex items-center gap-2">
                                                <template x-if="item.website && item.website.url">
                                                    <a :href="item.website.url" target="_blank" class="hover:text-primary transition-colors" x-text="item.location"></a>
                                                </template>
                                                <template x-if="!item.website || !item.website.url">
                                                    <span x-text="item.location"></span>
                                                </template>
                                            </div>

                                            <div class="text-text-muted text-sm leading-relaxed space-y-2 [&>p]:mb-2" x-html="item.description"></div>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </section>
                    </template>

                    <!-- Skills / Stack Section -->
                    <template x-if="!resume.sections.skills.hidden">
                        <section>
                            <h2 class="text-2xl font-bold text-text-heading flex items-center gap-3 mb-8">
                                <i class="fas fa-layer-group text-primary"></i>
                                <span x-text="resume.sections.skills.title"></span>
                            </h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                <template x-for="skill in resume.sections.skills.items" :key="skill.id">
                                    <template x-if="!skill.hidden">
                                        <div class="flex flex-col bg-surface border border-border-dark rounded-2xl p-5 hover:border-primary hover:shadow-[0_0_15px_rgba(234,88,12,0.2)] transition-all group">
                                            <div class="flex items-center gap-3 mb-3">
                                                <i :class="getSkillIcon(skill.name) + ' text-2xl text-text-muted-light group-hover:text-text-heading transition-colors'"></i>
                                                <div class="flex-1">
                                                    <h3 class="text-sm text-text-emphasized font-bold group-hover:text-text-heading" x-text="skill.name"></h3>
                                                    <template x-if="skill.level > 0">
                                                        <div class="flex gap-1 mt-1">
                                                            <template x-for="i in 5">
                                                                <div class="w-1.5 h-1.5 rounded-full" :class="i <= skill.level ? 'bg-primary' : 'bg-surface-dark'"></div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                            <template x-if="skill.keywords && skill.keywords.length > 0">
                                                <div class="flex flex-wrap gap-1.5 mb-auto mt-1">
                                                    <template x-for="keyword in skill.keywords">
                                                        <span class="text-[10px] bg-surface-dark/50 text-text-muted px-2 py-0.5 rounded-md border border-border-dark whitespace-nowrap" x-text="keyword"></span>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </section>
                    </template>

                    <!-- Grid Container for Other Sections -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                        <!-- Projects -->
                        <template x-if="resume.sections.projects && !resume.sections.projects.hidden && resume.sections.projects.items.filter(i => !i.hidden).length > 0">
                            <section>
                                <h2 class="text-xl font-bold text-text-heading flex items-center gap-2 mb-6">
                                    <i class="fas fa-project-diagram text-primary"></i>
                                    <span x-text="resume.sections.projects.title"></span>
                                </h2>
                                <div class="space-y-4">
                                    <template x-for="item in resume.sections.projects.items" :key="item.id">
                                        <template x-if="!item.hidden">
                                            <div class="bg-surface border border-border-dark rounded-xl p-5 hover:border-border-hover transition-colors">
                                                <h3 class="text-text-heading font-bold" x-text="item.name"></h3>
                                                <div class="text-primary text-xs mb-3 font-medium" x-text="item.period"></div>
                                                <div class="text-text-muted text-sm space-y-1" x-html="item.description"></div>
                                                <template x-if="item.website && item.website.url">
                                                    <a :href="item.website.url" target="_blank" class="text-sm text-text hover:text-primary transition-colors mt-4 inline-flex items-center gap-1 font-medium">
                                                        <i class="fas fa-link text-xs"></i> View Project
                                                    </a>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <!-- Certifications -->
                        <template x-if="resume.sections.certifications && !resume.sections.certifications.hidden && resume.sections.certifications.items.filter(i => !i.hidden).length > 0">
                            <section>
                                <h2 class="text-xl font-bold text-text-heading flex items-center gap-2 mb-6">
                                    <i class="fas fa-certificate text-primary"></i>
                                    <span x-text="resume.sections.certifications.title"></span>
                                </h2>
                                <div class="space-y-4">
                                    <template x-for="item in resume.sections.certifications.items" :key="item.id">
                                        <template x-if="!item.hidden">
                                            <div class="bg-surface border border-border-dark rounded-xl p-5 hover:border-border-hover transition-colors">
                                                <h3 class="text-text-heading font-bold text-sm mb-2" x-text="item.title"></h3>
                                                <div class="flex justify-between items-center mb-3">
                                                    <span class="text-text-muted text-xs" x-text="item.issuer"></span>
                                                    <span class="text-primary text-xs font-medium" x-text="item.date"></span>
                                                </div>
                                                <div class="text-text-muted text-sm space-y-1" x-html="item.description"></div>
                                                <template x-if="item.website && item.website.url">
                                                    <a :href="item.website.url" target="_blank" class="text-sm text-text hover:text-primary transition-colors mt-2 inline-flex items-center gap-1 font-medium">
                                                        <i class="fas fa-external-link-alt text-xs"></i> View Credential
                                                    </a>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <!-- Languages -->
                        <template x-if="resume.sections.languages && !resume.sections.languages.hidden && resume.sections.languages.items.filter(i => !i.hidden).length > 0">
                            <section>
                                <h2 class="text-xl font-bold text-text-heading flex items-center gap-2 mb-6">
                                    <i class="fas fa-globe text-primary"></i>
                                    <span x-text="resume.sections.languages.title"></span>
                                </h2>
                                <div class="space-y-4">
                                    <template x-for="item in resume.sections.languages.items" :key="item.id">
                                        <template x-if="!item.hidden">
                                            <div class="bg-surface border border-border-dark rounded-xl p-5 flex justify-between items-center hover:border-border-hover transition-colors">
                                                <span class="text-text-heading font-bold" x-text="item.language"></span>
                                                <div class="flex gap-1.5">
                                                    <template x-for="i in 5">
                                                        <div class="w-2.5 h-2.5 rounded-full" :class="i <= item.level ? 'bg-primary' : 'bg-surface-dark'"></div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <!-- Interests -->
                        <template x-if="resume.sections.interests && !resume.sections.interests.hidden && resume.sections.interests.items.filter(i => !i.hidden).length > 0">
                            <section>
                                <h2 class="text-xl font-bold text-text-heading flex items-center gap-2 mb-6">
                                    <i class="fas fa-heart text-primary"></i>
                                    <span x-text="resume.sections.interests.title"></span>
                                </h2>
                                <div class="space-y-4">
                                    <template x-for="item in resume.sections.interests.items" :key="item.id">
                                        <template x-if="!item.hidden">
                                            <div class="bg-surface border border-border-dark rounded-xl p-5 hover:border-border-hover transition-colors">
                                                <h3 class="text-text-heading font-bold mb-2" x-text="item.name"></h3>
                                                <template x-if="item.keywords && item.keywords.length > 0">
                                                    <div class="flex flex-wrap gap-1.5">
                                                        <template x-for="keyword in item.keywords">
                                                            <span class="text-[10px] bg-surface-dark/50 text-text-muted px-2 py-0.5 rounded-md border border-border-dark whitespace-nowrap" x-text="keyword"></span>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <!-- Awards -->
                        <template x-if="resume.sections.awards && !resume.sections.awards.hidden && resume.sections.awards.items.filter(i => !i.hidden).length > 0">
                            <section>
                                <h2 class="text-xl font-bold text-text-heading flex items-center gap-2 mb-6">
                                    <i class="fas fa-trophy text-primary"></i>
                                    <span x-text="resume.sections.awards.title"></span>
                                </h2>
                                <div class="space-y-4">
                                    <template x-for="item in resume.sections.awards.items" :key="item.id">
                                        <template x-if="!item.hidden">
                                            <div class="bg-surface border border-border-dark rounded-xl p-5 hover:border-border-hover transition-colors">
                                                <h3 class="text-text-heading font-bold text-sm mb-2" x-text="item.title"></h3>
                                                <div class="flex justify-between items-center mb-3">
                                                    <span class="text-text-muted text-xs" x-text="item.awarder"></span>
                                                    <span class="text-primary text-xs font-medium" x-text="item.date"></span>
                                                </div>
                                                <div class="text-text-muted text-sm space-y-1" x-html="item.description"></div>
                                                <template x-if="item.website && item.website.url">
                                                    <a :href="item.website.url" target="_blank" class="text-sm text-text hover:text-primary transition-colors mt-2 inline-flex items-center gap-1 font-medium">
                                                        <i class="fas fa-external-link-alt text-xs"></i> View Award
                                                    </a>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <!-- Publications -->
                        <template x-if="resume.sections.publications && !resume.sections.publications.hidden && resume.sections.publications.items.filter(i => !i.hidden).length > 0">
                            <section>
                                <h2 class="text-xl font-bold text-text-heading flex items-center gap-2 mb-6">
                                    <i class="fas fa-book text-primary"></i>
                                    <span x-text="resume.sections.publications.title"></span>
                                </h2>
                                <div class="space-y-4">
                                    <template x-for="item in resume.sections.publications.items" :key="item.id">
                                        <template x-if="!item.hidden">
                                            <div class="bg-surface border border-border-dark rounded-xl p-5 hover:border-border-hover transition-colors">
                                                <h3 class="text-text-heading font-bold text-sm mb-2" x-text="item.title"></h3>
                                                <div class="flex justify-between items-center mb-3">
                                                    <span class="text-text-muted text-xs" x-text="item.publisher"></span>
                                                    <span class="text-primary text-xs font-medium" x-text="item.date"></span>
                                                </div>
                                                <div class="text-text-muted text-sm space-y-1" x-html="item.description"></div>
                                                <template x-if="item.website && item.website.url">
                                                    <a :href="item.website.url" target="_blank" class="text-sm text-text hover:text-primary transition-colors mt-2 inline-flex items-center gap-1 font-medium">
                                                        <i class="fas fa-external-link-alt text-xs"></i> View Publication
                                                    </a>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </section>
                        </template>

                        <!-- References -->
                        <template x-if="resume.sections.references && !resume.sections.references.hidden && resume.sections.references.items.filter(i => !i.hidden).length > 0">
                            <section>
                                <h2 class="text-xl font-bold text-text-heading flex items-center gap-2 mb-6">
                                    <i class="fas fa-users text-primary"></i>
                                    <span x-text="resume.sections.references.title"></span>
                                </h2>
                                <div class="space-y-4">
                                    <template x-for="item in resume.sections.references.items" :key="item.id">
                                        <template x-if="!item.hidden">
                                            <div class="bg-surface border border-border-dark rounded-xl p-5 hover:border-border-hover transition-colors">
                                                <h3 class="text-text-heading font-bold text-sm mb-1" x-text="item.name"></h3>
                                                <div class="text-text-muted text-xs mb-3" x-text="item.position"></div>
                                                <template x-if="item.phone">
                                                    <div class="text-text-muted text-xs mb-1 flex items-center gap-1">
                                                        <i class="fas fa-phone w-3"></i> <a :href="'tel:' + item.phone" class="hover:text-text-heading" x-text="item.phone"></a>
                                                    </div>
                                                </template>
                                                <div class="text-text-muted text-sm space-y-1 italic border-l-2 border-primary pl-3 mt-3" x-html="item.description"></div>
                                                <template x-if="item.website && item.website.url">
                                                    <a :href="item.website.url" target="_blank" class="text-sm text-text hover:text-primary transition-colors mt-3 inline-flex items-center gap-1 font-medium">
                                                        <i class="fas fa-external-link-alt text-xs"></i> View Profile
                                                    </a>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </section>
                        </template>

                    </div>

                </main>
            </div>
        </template>
        <template x-if="error">
            <div class="text-error text-center" x-text="error"></div>
        </template>
    </div>

    <script>
        function resumeApp() {
            return {
                loading: true,
                resume: null,
                error: null,

                getSkillIcon(name) {
                    const iconMap = {
                        'Javascript/Typescript': 'fab fa-js',
                        'NodeJS': 'fab fa-node-js',
                        'Rust': 'fab fa-rust',
                        'ReactJS': 'fab fa-react',
                        'Angular': 'fab fa-angular',
                        'MongoDB': 'fas fa-database',
                        'Postgres': 'fas fa-database',
                        'Redis': 'fas fa-server',
                        'LLM and Agents': 'fas fa-robot',
                        'Flutter': 'fas fa-mobile-screen',
                        'DevOps': 'fab fa-docker',
                        'Software Principles': 'fas fa-code',
                        'Software Architectures': 'fas fa-sitemap'
                    };
                    return iconMap[name] || 'fas fa-star';
                },

                async initApp() {
                    try {
                        const response = await fetch('resume.json');
                        if (!response.ok) throw new Error('Failed to load resume data');
                        this.resume = await response.json();
                    } catch (err) {
                        this.error = err.message;
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
